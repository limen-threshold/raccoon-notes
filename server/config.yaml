# Raccoon Notes — runtime config
#
# This is the default / committed config. For private overrides (private
# memory endpoints, deployment-specific paths), create `config.local.yaml`
# alongside this file — it's gitignored and loaded with higher precedence.
# Env vars also override: RACCOON_<KEY> (e.g. RACCOON_ANTHROPIC_API_KEY).

# LLM for mapping memory → knowledge + generating lessons
anthropic:
  model: claude-sonnet-4-6
  max_tokens: 4096  # bumped from 2048: 5-concept WEAVE outputs hit ~2837 tokens
  # api_key: set via ANTHROPIC_API_KEY env var

# Memory source — generic HTTP search endpoint.
#
# The defaults below are placeholders. Your memory provider must expose a
# GET endpoint that accepts `q` and `n` query params and returns JSON of
# shape `{"memories": [{"memory_id", "snippet", ...}, ...]}`.
#
# To point this at Anchor Memory: set endpoint to your Anchor gateway and
# search_path to whatever search route you expose. To use a different
# memory backend, write a small HTTP adapter that matches the response
# shape.
memory:
  endpoint: http://localhost:8000
  search_path: /memories/search
  default_n_results: 5

# Tavily for fact-checking custom topics (later)
tavily:
  # api_key: set via TAVILY_API_KEY env var
  max_results: 5

# HTTP API server
http:
  host: 0.0.0.0
  port: 8200

# MCP server (stdio by default)
mcp:
  transport: stdio
